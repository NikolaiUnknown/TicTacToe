services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_IP: "${BACKEND_IP}:8080"
    depends_on:
      backend:
        condition: service_healthy
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://${BACKEND_IP}/actuator/health || exit 1" ]

      interval: 1s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '--password=${DB_PASSWORD}']
      interval: 1s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init/mysql/tables.sql:/docker-entrypoint-initdb.d/tables.sql
volumes:
  db_data: